[project]
name = "thread-it-backend"
version = "0.1.0"
description = "Thread It storefront API — FastAPI backend"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic-settings>=2.6",
    "loguru>=0.7",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "pyjwt>=2.10",
    "bcrypt>=4.2",
    "httpx>=0.28",
    "python-multipart>=0.0.18",
]

[dependency-groups]
dev = [
    "ruff>=0.8",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "testcontainers[postgres]>=4.8",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic-managed, autogenerated — not held to our style.
extend-exclude = ["migrations"]

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, pyupgrade, bugbear
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
